name: Check and update Board to Shield compatibility

on:
  workflow_dispatch

jobs:  
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo
      uses: actions/checkout@v6
    - name: Setup permissions
      run: |
        chmod +x ./scripts/BoardToShield/lua/src/lua
        chmod +x ./scripts/BoardToShield/HeaderUpdater/run.sh
        chmod +x ./scripts/BoardToShield/PinMapper/run.sh
        chmod +x ./scripts/BoardToShield/Validator/run.sh
    - name: Create new branch
      run: |
        git checkout -b feature/automated-board-shield-compatibility
    - name: execute PinMapper
      run: |
        ./run.sh
      working-directory: ./scripts/BoardToShield/PinMapper
    - name: execute Validator
      run: |
        ./run.sh
      working-directory: ./scripts/BoardToShield/Validator
    - name: execute HeaderUpdater
      run: |
        ./run.sh
      working-directory: ./scripts/BoardToShield/HeaderUpdater
    - name: Commit changes
      run: |
        git add .
        git commit -m "Updated board/shield compatibilities"
        git push -u origin feature/automated-board-shield-compatibility
    - name: Create a pull request using gh-cli
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh pr create -B master -H feature/automated-board-shield-compatibility --title 'Merge automated-board-shield-compatibility into master' --body 'Created by Github action'
